<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Raisa Ihnat</title>
  <meta name="description" content="Contact Raisa Ihnat for general inquiries." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <!-- Font Awesome (CSS CDN so it works on GitHub Pages) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" referrerpolicy="no-referrer" />

  <style>
    :root{
      --bg:#000;
      --ink:#e6f0ff;
      --pad:clamp(14px,2.5vw,24px);
      --max:900px;
      --radius:14px;
      --border:#e5e5ef;
      --muted:#555;
      --accent:#000;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg); color: #000;
      font-family:"Lora", Georgia, serif; min-height:100vh; display:flex; flex-direction:column;
    }

    header{ position:sticky; top:0; background:#000; border-bottom:0.5px solid #eee; }
    .nav{
      max-width:var(--max); margin:0 auto; padding:var(--pad);
      display:flex; align-items:center; gap:24px; justify-content:center;
      font-family:"Lora", Georgia, serif; font-weight:900;
    }
    .nav a{ color:var(--ink); text-decoration:none; letter-spacing:.06em; }
    .nav a:hover{ text-decoration:underline; }

    main{ flex:1; max-width:var(--max); margin:0 auto; padding:var(--pad); }
    h1{ font-family:"Lora", Georgia, serif; font-weight:400;font-size:clamp(24px,3vw,30px); margin:0 0 1rem; text-align:center; }
    .lead{ text-align:center; color: #000; margin:0 0 1.5rem; }

    .single-card-wrap{
      display: flex;
      justify-content: center;
    }
    .card{
      background:#fff; border:1px solid var(--border); border-radius:var(--radius);
      padding:clamp(18px,3vw,28px); box-shadow:0 10px 25px rgba(0,0,0,.06);
      display:flex; flex-direction:column;
      max-width: 600px;
      width: 100%;
    }
    .card h2{
      margin:0 0 .6rem; font-family:"Lora", Georgia, serif; font-weight:400;font-size:1.25rem;
      text-align:center;
    }
    .small{ color:var(--muted); margin:0 0 1rem; font-size:.95rem; text-align:center; }

    form.contact-form{ display:flex; flex-direction:column; gap:14px; }
    label{ font-weight:400; font-size:.95rem; }
    input, textarea, select{
      width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; font:inherit; background:#fafafe;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }

    #g-message {
      min-height: 180px;
    }

    .row {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 560px) {
      .row { grid-template-columns: 1fr; }
    }

    .actions{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:auto; }

   .btn {
  display: inline-block;
  padding: 12px 18px;
  border-radius: 10px;
  border: 1px solid #000;
  background: var(--accent);
  color: #ffffff;
  font-weight: 700;
  letter-spacing: .04em;
  cursor: pointer;
  transition: color 0.25s ease, background 0.25s ease;
}

.btn:hover {
  color: #1a8cff;
}

    .email-btn {
      display:flex;
      align-items:center;
      justify-content:center;
      width:48px;
      height:48px;
      border-radius:10px;
      font-size:20px;
      padding:0;
      border:1px solid #000;
      background:#fff;
      color:#000;
      transition:transform .2s ease, background .2s ease, color .2s ease;
    }
    .email-btn:hover {
      background:var(--accent);
      color:#fff;
      transform:scale(1.1);
    }

    .success, .error{
      display:none; margin-top:8px; padding:10px 12px; border-radius:10px; font-weight:400; text-align:center;
    }
    .success{ background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .error{ background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }

    footer{ text-align:center; padding:2rem; color: var(--ink); }

    .connect-wrap{ text-align:center; margin-top:3rem; }
    .connect-wrap h2{ font-family:"Lora", Georgia, serif; font-size:1.2rem; margin:0 0 1rem; }
    .social-links{ display:flex; justify-content:center; gap:24px; }
    .social-links a{ display:inline-block; line-height:0; color:#fff; }
    .social-links i{ font-size:28px; transition:transform .2s ease, color .2s ease; }
    .social-links a:hover i{ transform:scale(1.15); }
    .social-links a[aria-label*="LinkedIn"]:hover i{ color:#1a8cff; }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="media.html">WORK</a>
      <a href="studio.html">STUDIO</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </header>

  <section class="connect-wrap">
    <h2></h2>
    <div class="social-links">
      <a href="https://www.linkedin.com/in/raisa-i-456543208/" target="_blank" rel="noopener" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      <a href="https://www.instagram.com/r.ihnat/?hl=en" target="_blank" rel="noopener" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </section>

  <main>
    <h1></h1>
    <p class="lead"></p>

    <div class="single-card-wrap">
      <section class="card">
        <h2>General Inquiry</h2>
        <p class="small"></p>

        <form class="contact-form" action="https://formspree.io/f/xyznbzvo" method="POST">
          <div class="row">
            <div>
              <label for="g-name">Name</label>
              <input id="g-name" name="name" type="text" autocomplete="name" required />
            </div>
            <div>
              <label for="g-email">Email</label>
              <input id="g-email" name="_replyto" type="email" autocomplete="email" required />
            </div>
          </div>

          <div>
            <label for="g-subject">Subject</label>
            <input id="g-subject" name="subject" type="text" />
          </div>

          <div>
            <label for="g-message">Message</label>
            <textarea id="g-message" name="message" required></textarea>
          </div>

          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
          <input type="hidden" name="_next" value="contact.html#sent-general" />

          <div class="actions">
            <button class="btn" type="submit">Send</button>
            <a class="email-btn" href="mailto:raisaihnat@gmail.com" aria-label="Email Raisa directly">
              <i class="fa-regular fa-envelope"></i>
            </a>
          </div>

          <div class="success">Thank you!</div>
          <div class="error">Hmm, something went wrong. Please try again or use the email button.</div>
        </form>
      </section>
    </div>
  </main>

  <footer>
    &copy; <span id="year"></span> Raisa Ihnat. All Rights Reserved.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const forms = document.querySelectorAll('.contact-form');
    forms.forEach(form => {
      form.addEventListener('submit', async (e) => {
        if (form.action.includes('REPLACE_')) return;
        e.preventDefault();
        const success = form.querySelector('.success');
        const error = form.querySelector('.error');
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        try {
          const resp = await fetch(form.action, { method: 'POST', headers: { 'Accept': 'application/json' }, body: new FormData(form) });
          if (resp.ok) {
            success.style.display = 'block';
            error.style.display = 'none';
            form.reset();
          } else {
            success.style.display = 'none';
            error.style.display = 'block';
          }
        } catch {
          success.style.display = 'none';
          error.style.display = 'block';
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
